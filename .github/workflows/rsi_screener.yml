name: NSE RSI Screener — Weekly Saturday Run

on:
  schedule:
    - cron: "35 3 * * 6"   # Saturday 03:35 UTC = 09:05 AM IST
  workflow_dispatch:         # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSI Screener + Send Telegram Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rsi_screener.py

      - name: Upload Excel report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RSI-Screener-Report-${{ github.run_id }}
          path: output/*.xlsx
          retention-days: 90

      - name: Commit report to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet \
            || git commit -m "📊 RSI Report — $(date +'%Y-%m-%d') [auto]"
          git push
